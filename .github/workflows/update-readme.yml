name: Update README Timestamp

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Last Updated date
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          sed -i "s/<!-- Last Updated 자동 갱신:.*-->/<!-- Last Updated 자동 갱신: $TODAY -->/" README.md
          if grep -q "Last Updated:" README.md; then
            sed -i "s/\*\*Last Updated\*\*:.*//" README.md
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: README 타임스탬프 자동 갱신"
          git push
